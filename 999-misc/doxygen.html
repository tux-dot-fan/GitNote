<h1 id="add-code-in-comment">add code in comment</h1>

<div class="language-plaintext highlighter-rouge"><div class="highlight"><pre class="highlight"><code>  \code{.cpp}
  class Cpp {};
  \endcode
</code></pre></div></div>

<p>clion还支持这种写法：</p>

<div class="language-plaintext highlighter-rouge"><div class="highlight"><pre class="highlight"><code>@code
int main() {
  return 0
}
</code></pre></div></div>

<p><code class="language-plaintext highlighter-rouge">@code</code>与代码之间不能空行。</p>
