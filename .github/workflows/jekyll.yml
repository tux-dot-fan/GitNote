name: Jekyll site CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler: 'latest'

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y asciidoctor tree
        gem install jekyll minima jekyll-asciidoc jekyll-avatar jekyll-mentions jekyll-gist jekyll-jupyter-notebook jemoji webrick

    - name: Build Jekyll site
      run: |
        rm -rf .git
        ROOT=${{ github.workspace }}
        
        # Move Gemfile out of the way so jekyll doesn't use bundler
        mv "$ROOT/Gemfile" "$ROOT/Gemfile.bak"
        mv "$ROOT/Gemfile.lock" "$ROOT/Gemfile.lock.bak" 2>/dev/null || true

        # Copy config to Notes
        cp "$ROOT/_config.yml" "$ROOT/Notes/_config.yml"

        # Process asciidoc for vulkan notes
        if [ -d "$ROOT/Notes/004-3d-rendering/vulkan/" ]; then
          cd "$ROOT/Notes/004-3d-rendering/vulkan/"
          asciidoctor -a toc=right -n -s -e -R ./ -D ../vulkan_html/ $(find . -name "*.adoc") || true
          cp -r chapters/images ../vulkan_html/chapters/ || true
          cp -r chapters/extensions/images ../vulkan_html/chapters/extensions/ || true
          cp index.md ../vulkan_html/ || true
          cp chapters/index.md ../vulkan_html/chapters/ || true
          cp chapters/extensions/index.md ../vulkan_html/chapters/extensions/ || true
          for file in $(find ../vulkan_html/ -name "*.html"); do mv -- "$file" "${file%.html}.md"; done
        fi

        # Build jekyll
        cd "$ROOT"
        JEKYLL_ENV=production jekyll build --source "$ROOT/Notes" --destination "$ROOT/Notes/_site"
        ls "$ROOT/Notes/_site/" | head -5

    - name: GitHub Pages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      uses: crazy-max/ghaction-github-pages@v2.6.0
      with:
        target_branch: ghp1
        build_dir: Notes/_site
